<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World Deploy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #fdf6ec;
        --bg-2: #d8f0ff;
        --bg-3: #ffe3cc;
        --text: #1a2433;
        --accent: #ff6a3d;
        --card: rgba(255, 255, 255, 0.75);
        --shadow: 0 20px 60px rgba(26, 36, 51, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 20%, var(--bg-3), transparent 40%),
          radial-gradient(circle at 80% 10%, var(--bg-2), transparent 35%),
          linear-gradient(135deg, var(--bg-1), #fff4da 55%, #e7f8ff);
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 50%;
        z-index: -1;
        filter: blur(8px);
        opacity: 0.7;
        animation: float 10s ease-in-out infinite;
      }

      body::before {
        width: 260px;
        height: 260px;
        background: #ffd166;
        top: -60px;
        right: -40px;
      }

      body::after {
        width: 320px;
        height: 320px;
        background: #7ad3ff;
        bottom: -90px;
        left: -80px;
        animation-delay: 1.2s;
      }

      .card {
        width: min(920px, 92vw);
        background: var(--card);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 28px;
        box-shadow: var(--shadow);
        display: grid;
        grid-template-columns: 1fr 1fr;
        overflow: hidden;
        transform: translateY(14px);
        opacity: 0;
        animation: reveal 0.8s ease forwards;
      }

      .hero {
        padding: 44px;
      }

      .badge {
        display: inline-block;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #35516c;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 999px;
        padding: 8px 14px;
      }

      h1 {
        margin: 18px 0 10px;
        font-family: "Bungee", cursive;
        font-weight: 400;
        line-height: 1.05;
        font-size: clamp(2rem, 6vw, 3.6rem);
      }

      p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.6;
        max-width: 36ch;
      }

      .cta {
        margin-top: 24px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: #fff;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent), #ff8f4f);
        padding: 12px 18px;
        border-radius: 14px;
        box-shadow: 0 12px 24px rgba(255, 106, 61, 0.3);
        transition: transform 0.2s ease;
      }

      .cta:hover {
        transform: translateY(-2px);
      }

      .image-wrap {
        min-height: 320px;
        position: relative;
      }

      .image-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .overlay {
        position: absolute;
        inset: auto 16px 16px 16px;
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        border-radius: 14px;
        padding: 12px;
        font-weight: 600;
        opacity: 0;
        transform: translateY(8px);
        animation: reveal 0.8s ease forwards;
        animation-delay: 0.35s;
      }

      @keyframes reveal {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float {
        50% {
          transform: translateY(12px) scale(1.04);
        }
      }

      @media (max-width: 760px) {
        .card {
          grid-template-columns: 1fr;
        }

        .hero {
          padding: 30px;
        }

        .image-wrap {
          min-height: 260px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="hero">
        <span class="badge">Docker + CI/CD</span>
        <h1>Hello World</h1>
        <p>
          Front-end simples, elegante e pronto para deploy automatico com GitHub
          Actions.
        </p>
        <a class="cta" href="https://github.com" target="_blank" rel="noreferrer">
          Ver pipeline
        </a>
      </section>
      <section class="image-wrap">
        <img
          src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?auto=format&fit=crop&w=1200&q=80"
          alt="Imagem de codigo em tela"
        />
        <div class="overlay">Buildou? Entao deployou.</div>
      </section>
    </main>
  </body>
</html>
