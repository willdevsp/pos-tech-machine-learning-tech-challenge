name: FASE 0 - Bootstrap AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Select environment'
        options:
          - staging
          - production
        default: staging
  push:
    branches: [main]
    paths:
      - '.github/workflows/fase0-bootstrap.yml'
      - 'fase_1/tech_challenge/infrastructure/scripts/fase0-bootstrap.sh'
      - 'fase_1/tech_challenge/infrastructure/scripts/iam-policy.json'

env:
  AWS_REGION: us-east-1
 
  SCRIPTS_PATH: fase_1/tech_challenge/infrastructure/scripts

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS access
        run: |
          echo "✅ AWS credentials configured"
          aws sts get-caller-identity
          echo "Account ID: ${{ secrets.ACCOUNT_ID }}"
          echo "Region: ${{ env.AWS_REGION }}"

      - name: Create S3 bucket for Terraform state
        run: |
          BUCKET_NAME="telco-tf-state-${{ secrets.ACCOUNT_ID }}"
          
          echo "📦 Creating S3 bucket: $BUCKET_NAME"
          
          # Check if bucket exists
          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "⚠️  Bucket already exists: $BUCKET_NAME"
          else
            aws s3api create-bucket \
              --bucket "$BUCKET_NAME" \
              --region ${{ env.AWS_REGION }}
            echo "✅ Bucket created: $BUCKET_NAME"
          fi
          
          # Enable versioning
          aws s3api put-bucket-versioning \
            --bucket "$BUCKET_NAME" \
            --versioning-configuration Status=Enabled
          echo "✅ Versioning enabled"
          
          # Enable encryption
          aws s3api put-bucket-encryption \
            --bucket "$BUCKET_NAME" \
            --server-side-encryption-configuration '{
              "Rules": [{
                "ApplyServerSideEncryptionByDefault": {
                  "SSEAlgorithm": "AES256"
                }
              }]
            }'
          echo "✅ AES256 encryption enabled"
          
          # Block public access
          aws s3api put-public-access-block \
            --bucket "$BUCKET_NAME" \
            --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          echo "✅ Public access blocked"

      - name: Create DynamoDB table for Terraform locks
        run: |
          LOCK_TABLE="telco-tf-locks"
          
          echo "🔒 Creating DynamoDB table: $LOCK_TABLE"
          
          # Check if table exists
          if aws dynamodb describe-table --table-name "$LOCK_TABLE" 2>/dev/null; then
            echo "⚠️  DynamoDB table already exists: $LOCK_TABLE"
          else
            aws dynamodb create-table \
              --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ${{ env.AWS_REGION }}
            
            echo "⏳ Waiting for DynamoDB table to be active..."
            aws dynamodb wait table-exists --table-name "$LOCK_TABLE"
            echo "✅ DynamoDB table created and active"
          fi

      - name: Apply IAM Policy to role
        run: |
          ROLE_NAME=${{ secrets.AWS_ROLE_ARN }}
          POLICY_NAME="TechChallengeTerraformPolicy"
          
          echo "📋 Applying IAM Policy to role: $ROLE_NAME"
          
          # Check if role exists
          if ! aws iam get-role --role-name "$ROLE_NAME" &>/dev/null; then
            echo "❌ IAM Role not found: $ROLE_NAME"
            echo "   Please create the role first in AWS console"
            exit 1
          fi
          
          # Apply policy
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "$POLICY_NAME" \
            --policy-document file://${{ env.SCRIPTS_PATH }}/iam-policy.json
          
          echo "✅ IAM Policy applied"
          
          # Verify policy
          ROLE_ARN=$(aws iam get-role --role-name "$ROLE_NAME" --query 'Role.Arn' --output text)
          echo "🔐 Role ARN: $ROLE_ARN"

      - name: Validate bootstrap
        run: |
          BUCKET_NAME="telco-tf-state-${{ secrets.ACCOUNT_ID }}"
          LOCK_TABLE="telco-tf-locks"
          
          echo "✅ Validating FASE 0 bootstrap..."
          
          # Validate S3
          if aws s3api get-bucket-versioning --bucket "$BUCKET_NAME" | grep -q "Enabled"; then
            echo "✅ S3 bucket versioning: OK"
          fi
          
          # Validate DynamoDB
          if aws dynamodb describe-table --table-name "$LOCK_TABLE" --query 'Table.TableStatus' | grep -q "ACTIVE"; then
            echo "✅ DynamoDB table: OK"
          fi
          
          # Validate IAM Role
          if aws iam get-role --role-name ${{ secrets.AWS_ROLE_ARN }} &>/dev/null; then
            echo "✅ IAM Role: OK"
          fi
          
          echo ""
          echo "🎉 FASE 0 BOOTSTRAP COMPLETE!"
          echo "📊 Resources created/updated:"
          echo "   - S3 Bucket: $BUCKET_NAME"
          echo "   - DynamoDB Table: $LOCK_TABLE"
          echo "   - IAM Policy: Applied to github-action-tech-challenge"
          echo ""
          echo "Ready for FASE 1 (Terraform deployment)"

      - name: Output success
        run: |
          echo "✅ All FASE 0 bootstrap tasks completed successfully"
          echo "You can now run: terraform init && terraform plan"
