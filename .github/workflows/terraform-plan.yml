name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'fase_1/tech_challenge/infrastructure/terraform/**'
      - '.github/workflows/terraform-plan.yml'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Select environment'
        options:
          - staging
          - production
        default: staging

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: 204524745296
  TERRAFORM_VERSION: 1.7.0

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            ENV="staging"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "Selected environment: $ENV"

      - name: Terraform Init
        working-directory: fase_1/tech_challenge/infrastructure/terraform
        run: |
          terraform init \
            -backend-config=environments/${{ steps.env.outputs.environment }}/backend.tf \
            -upgrade

      - name: Terraform Format Check
        working-directory: fase_1/tech_challenge/infrastructure/terraform
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: fase_1/tech_challenge/infrastructure/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: fase_1/tech_challenge/infrastructure/terraform
        run: |
          terraform plan \
            -var-file=environments/${{ steps.env.outputs.environment }}/terraform.tfvars \
            -var="rds_password=${{ secrets.RDS_PASSWORD }}" \
            -var="mlflow_image_uri=${{ secrets.MLFLOW_IMAGE_URI || format('{0}.dkr.ecr.us-east-1.amazonaws.com/telco-churn-mlflow:latest', secrets.ACCOUNT_ID) }}" \
            -var="acm_certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN || 'arn:aws:acm:us-east-1:204524745296:certificate/placeholder' }}" \
            -out=tfplan
        env:
          TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.env.outputs.environment }}
          path: fase_1/tech_challenge/infrastructure/terraform/tfplan

      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planFile = 'fase_1/tech_challenge/infrastructure/terraform/tfplan';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Terraform plan completed. Check artifacts for plan details.'
            });
