name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Run pytest and ruff
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 1. Install project dependencies first
          pip install -r fase_1/tech_challenge/requirements.txt
          # 2. Install dev tools (ruff, pytest)
          pip install -r fase_1/tech_challenge/requirements-dev.txt

      - name: Run ruff (Lint & PEP8)
        # We run from the root but target the specific subfolder
        run: |
          python -m ruff check fase_1/tech_challenge
          python -m ruff format --check fase_1/tech_challenge

      - name: Run pytest
        run: |
          # Use PYTHONPATH so the 'src' inside the subfolder is discoverable
          export PYTHONPATH=$PYTHONPATH:$(pwd)/fase_1/tech_challenge
          python -m pytest fase_1/tech_challenge/tests
