name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Select environment to destroy'
        options:
          - staging
          - production
        default: staging
      confirm_destroy:
        type: choice
        description: 'CONFIRM: Type destroy to proceed'
        options:
          - "cancel"
          - "destroy"
        default: "cancel"

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.7.0

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]]; then
            echo "Destroy cancelled - confirmation not provided"
            exit 1
          fi
          echo "Destroy confirmed for ${{ github.event.inputs.environment }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: fase_1/tech_challenge/infrastructure/terraform
        run: |
          terraform init \
            -backend-config=environments/${{ github.event.inputs.environment }}/backend.tf \
            -upgrade

      - name: Terraform Destroy
        working-directory: fase_1/tech_challenge/infrastructure/terraform
        run: |
          terraform destroy \
            -var-file=environments/${{ github.event.inputs.environment }}/terraform.tfvars \
            -var="rds_password=${{ secrets.RDS_PASSWORD }}" \
            -var="mlflow_image_uri=${{ secrets.MLFLOW_IMAGE_URI }}" \
            -var="acm_certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN }}" \
            -auto-approve

      - name: Publish Summary
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const msg = 'Terraform destroy completed for environment: ${{ github.event.inputs.environment }}. Terraform state preserved in S3.';
            await core.summary.addRaw(msg).write();

