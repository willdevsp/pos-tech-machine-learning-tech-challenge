# Ruff configuration for Telco Churn Prediction

[tool.ruff]
# Python versions to target
target-version = "py310"
line-length = 100

# Rules to enable
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "C4",     # flake8-comprehensions
    "PT",     # flake8-pytest-style
    "SIM",    # flake8-simplify
    "RUF",    # Ruff-specific rules
]

# Rules to ignore
ignore = [
    "E501",   # Line too long (handled by black)
    "W191",   # Indentation contains tabs
    "D100",   # Missing docstring in public module
    "D104",   # Missing docstring in public package
]

# Exclude patterns
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "build",
    "dist",
    ".eggs",
    "notebooks",
    "*.egg-info",
    ".pytest_cache",
    ".mypy_cache",
]

# Per-file ignores
[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports are often intentional in __init__
"tests/**" = ["D100", "D101"]  # docstrings not required in tests

# Isort configuration
[tool.ruff.isort]
profile = "black"
known-first-party = ["src"]

# Flake8-bugbear configuration
[tool.ruff.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends"]

# Pylint configuration
[tool.ruff.pylint]
max-args = 7
max-attributes = 10
