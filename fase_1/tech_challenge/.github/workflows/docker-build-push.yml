name: Docker Build & Push ECR

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'src/**'
      - '.github/workflows/docker-build-push.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: 204524745296

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        dockerfile:
          - name: mlflow
            path: Dockerfile.mlflow
            repo: telco-churn-mlflow
          - name: api
            path: Dockerfile.api
            repo: telco-churn-api
          - name: training
            path: Dockerfile.training
            repo: telco-churn-training

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/github-action-tech-challenge
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          REPO_NAME="${{ matrix.dockerfile.repo }}"
          
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" 2>/dev/null; then
            echo "📦 Creating ECR repository: $REPO_NAME"
            aws ecr create-repository \
              --repository-name "$REPO_NAME" \
              --region ${{ env.AWS_REGION }}
            echo "✅ Repository created"
          else
            echo "✅ Repository already exists: $REPO_NAME"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile.path }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.dockerfile.repo }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.dockerfile.repo }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ matrix.dockerfile.repo }}:buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ matrix.dockerfile.repo }}:buildcache,mode=max

      - name: Output image URI
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ matrix.dockerfile.repo }}:${{ github.sha }}"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "✅ Image pushed: $IMAGE_URI"

  output-images:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Summary
        run: |
          echo "🎉 All Docker images built and pushed successfully!"
          echo "Available in ECR:"
          echo "  - telco-churn-mlflow:${{ github.sha }}"
          echo "  - telco-churn-api:${{ github.sha }}"
          echo "  - telco-churn-training:${{ github.sha }}"
